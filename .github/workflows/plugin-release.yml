name: Build plugin release assets

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); const tag=process.env.GITHUB_REF_NAME; if (manifest.version !== tag) { throw new Error(`Tag ${tag} does not match manifest version ${manifest.version}`); }"
      - run: npm run build
      - run: mkdir -p dist/plugin && cp main.js manifest.json styles.css dist/plugin/
      - uses: actions/upload-artifact@v5
        with:
          name: pomovault-plugin
          path: dist/plugin
