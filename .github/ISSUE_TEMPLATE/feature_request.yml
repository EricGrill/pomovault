name: Feature request
description: Suggest an improvement or new capability
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Share the problem you are solving and how you imagine PomoVault could help.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is frustrating, missing, or hard to do today?
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: How should PomoVault work or what should it offer?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches, workarounds, or tools you have considered.
    validations:
      required: false
